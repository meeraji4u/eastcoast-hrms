version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hrms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: hrms123
      POSTGRES_DB: hrmsdb
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - hrms_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hrms-redis
    restart: unless-stopped
    networks:
      - hrms_net

  backend:
    build: ./backend
    container_name: hrms-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - POSTGRES_URL=postgresql://hrms:hrms123@postgres:5432/hrmsdb
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hrms_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: hrms-frontend
    restart: unless-stopped
    ports:
      - "8091:80"
    depends_on:
      - backend
    networks:
      - hrms_net

volumes:
  pg_data:
    driver: local

networks:
  hrms_net:
    driver: bridge
